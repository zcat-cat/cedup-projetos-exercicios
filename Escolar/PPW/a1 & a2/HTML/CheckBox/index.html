<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Cadastro</title>
</head>
<body>
   <h1>Atividade do Castellan:</h1>
   <hr>

    <table border="0">
         <tr>

        </tr>

         <tr>
            <td>Endereço:</td>
            <td><input type="text" name="nome"></td>
        </tr>

        <tr>

                <input type="checkbox" id="chkSNM" name="ASPNM">ASP.NET MVC
                <input type="checkbox" id="chkP" name="PHP">PHP
            </td>
         </tr>

            <td></td>
